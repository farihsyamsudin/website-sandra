services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: discharging_card_system_app
    restart: always
    ports:
      - "${APP_PORT:-8045}:80"
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    ports:
      - "${FORWARD_DB_PORT:-3389}:3306"
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-discharging_cardsystem}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - db-data:/var/lib/mysql
      - ./.dockerize/db:/docker-entrypoint-initdb.d

volumes:
  app-storage:
  app-bootstrap-cache:
  db-data:
